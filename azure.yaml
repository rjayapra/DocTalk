name: doctalk
metadata:
  template: azd-init
services:
  api:
    host: containerapp
    project: .
    language: python
    image: ${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/doctalk-api:${AZURE_ENV_NAME}
    docker:
      remoteBuild: true
  worker:
    host: containerapp
    project: .
    language: python
    image: ${AZURE_CONTAINER_REGISTRY_LOGIN_SERVER}/doctalk-worker:${AZURE_ENV_NAME}
    docker:
      remoteBuild: true
hooks:
  postprovision:
    shell: sh
    run: |
      echo "Setting Entra ID Application ID URI..."
      if [ -n "$ENTRA_APP_ID" ]; then
        az ad app update --id "$ENTRA_APP_ID" --identifier-uris "api://$ENTRA_APP_ID"
        echo "Application ID URI set to api://$ENTRA_APP_ID"
      else
        echo "ENTRA_APP_ID not set — skipping Application ID URI configuration"
      fi
      echo "Building images with az acr build (no local Docker needed)..."
      az acr build --registry "$AZURE_CONTAINER_REGISTRY_NAME" --image "doctalk-api:$AZURE_ENV_NAME" --file Dockerfile.api .
      az acr build --registry "$AZURE_CONTAINER_REGISTRY_NAME" --image "doctalk-worker:$AZURE_ENV_NAME" --file Dockerfile.worker .
