[pytest]
# Pytest configuration for DocTalk

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = test

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --color=yes

# Markers
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (may require Azure resources)
    slow: Slow-running tests

# Minimum Python version
minversion = 3.10
